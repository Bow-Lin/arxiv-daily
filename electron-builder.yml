appId: com.arxiv-daily
productName: arXiv Daily
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - node_modules/sql.js/**/*
mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - dmg
    - zip
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - portable
linux:
  target:
    - AppImage
  category: Utility
